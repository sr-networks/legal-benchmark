  <text x="1182" y="326" text-anchor="end" fill="#64748B" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">Our harness</text>
  <rect x="132" y="344" width="1050" height="34" rx="17" fill="#E7EDF5"/>
  <rect x="132" y="344" width="966" height="34" rx="17" fill="url(#bar1)"/>
  <text x="1218" y="369" text-anchor="end" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="750">92%</text>

  <text x="132" y="418" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650">LegalGenius + GLM-5.1</text>
  <text x="1182" y="418" text-anchor="end" fill="#64748B" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">Our harness</text>
  <rect x="132" y="436" width="1050" height="34" rx="17" fill="#E7EDF5"/>
  <rect x="132" y="436" width="956" height="34" rx="17" fill="url(#bar2)"/>
  <text x="1218" y="461" text-anchor="end" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="750">91%</text>

  <text x="132" y="510" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650">LegalGenius + GPT-5.4</text>
  <text x="1182" y="510" text-anchor="end" fill="#64748B" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">Our harness</text>
  <rect x="132" y="528" width="1050" height="34" rx="17" fill="#E7EDF5"/>
  <rect x="132" y="528" width="914" height="34" rx="17" fill="url(#bar3)"/>
  <text x="1218" y="553" text-anchor="end" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="750">87%</text>

  <text x="132" y="602" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650">LegalGenius + GLM-5</text>
  <text x="1182" y="602" text-anchor="end" fill="#64748B" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">Our harness</text>
  <rect x="132" y="620" width="1050" height="34" rx="17" fill="#E7EDF5"/>
  <rect x="132" y="620" width="903" height="34" rx="17" fill="url(#bar4)"/>
  <text x="1218" y="645" text-anchor="end" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="750">86%</text>

  <text x="132" y="694" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650">LegalGenius + Qwen3.6 Plus</text>
  <text x="1182" y="694" text-anchor="end" fill="#64748B" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">Our harness</text>
  <rect x="132" y="712" width="1050" height="34" rx="17" fill="#E7EDF5"/>
  <rect x="132" y="712" width="892" height="34" rx="17" fill="url(#bar5)"/>
  <text x="1218" y="737" text-anchor="end" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="750">85%</text>

  <text x="132" y="786" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650">Libra (DeepThinking)</text>
  <text x="1182" y="786" text-anchor="end" fill="#64748B" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">External reference</text>
  <rect x="132" y="804" width="1050" height="34" rx="17" fill="#E7EDF5"/>
