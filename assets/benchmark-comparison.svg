  <text x="1218" y="829" text-anchor="end" fill="#0F172A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="750">73%</text>

  <text x="132" y="848" fill="#64748B" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500">LegalGenius rows are our harness runs with the named model. Libra is an external DeepThinking reference.</text>
