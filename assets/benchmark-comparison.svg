  <line x1="657" y1="302" x2="657" y2="824" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="920" y1="302" x2="920" y2="824" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="1182" y1="302" x2="1182" y2="824" stroke="#CBD5E1" stroke-width="2"/>

